[General]
sim-time-limit = 200s
repeat = 3
seed-set = ${repetition}

**.alpha = 0.7
**.updateInterval = 1s
**.costMetric = 1.0
**.trafficRate = exponential(1s)
**.mobility.maxX = 1500
**.mobility.maxY = 1500

# ---------- Flooding ----------
[Config Flood50]
network = QNet_Flood
**.numNodes = 50
**.mobility.speed = 15mps

[Config Flood100]
network = QNet_Flood
**.numNodes = 100
**.mobility.speed = 15mps


[General]
network = QNet
sim-time-limit = 100s

# ---------- MADRL + FL parameters ----------
**.alpha = 0.001              # DQN learning rate (small for neural nets)
**.updateInterval = 1s        # how often Q-updates are broadcast
**.discountFactor = 0.9
**.replayCapacity = 100
**.batchSize = 16
**.hiddenDim = 16
**.epsilon = 0.3
**.flInterval = 10s           # Federated Learning aggregation period

# ---------- Traffic & Mobility ----------
**.trafficRate = exponential(1s)
**.mobility.maxX = 1500
**.mobility.maxY = 1500
**.mobility.speed = 15mps

# ---------- Default node count ----------
**.numNodes = 50

# ---------- Batch configuration ----------
repeat = 3
seed-set = ${repetition}
**.collector.csvFile = "results-${configname}-${repetition}.csv"

[Node50]
**.numNodes = 50

[Node100]
**.numNodes = 100

[Node150]
**.numNodes = 150

[Node200]
**.numNodes = 200
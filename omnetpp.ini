[General]
network = QNet
sim-time-limit = 100s

# Common parameters
**.alpha = 0.7
**.updateInterval = 1s
**.costMetric = 1.0
**.trafficRate = exponential(1s)
**.mobility.maxX = 1500
**.mobility.maxY = 1500
**.mobility.speed = 15mps

# Default node count (overridden per config)
**.numNodes = 50

# Repeat each config 3 times with different seeds
repeat = 3
seed-set = ${repetition}

# Collector CSV file name (separate file per config + repetition)
**.collector.csvFile = "results-${configname}-${repetition}.csv"

[Node50]
**.numNodes = 50

[Node100]
**.numNodes = 100

[Node150]
**.numNodes = 150

[Node200]
**.numNodes = 200
